<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}On-Call Assistant{% endblock %} — ADOStack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #111111;
      --surface:      #181818;
      --card:         #1f1f1f;
      --border:       #2a2a2a;
      --border2:      #333333;
      --accent:       #ff6b00;
      --accent2:      #ff8c00;
      --accent-dim:   rgba(255,107,0,0.12);
      --accent-glow:  rgba(255,107,0,0.25);
      --red:          #f2495c;
      --red-dim:      rgba(242,73,92,0.12);
      --yellow:       #f5a623;
      --yellow-dim:   rgba(245,166,35,0.12);
      --green:        #73bf69;
      --green-dim:    rgba(115,191,105,0.12);
      --purple:       #a78bfa;
      --text:         #d9d9d9;
      --muted:        #686868;
      --mono:         'JetBrains Mono', 'Fira Code', monospace;
      --sans:         'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .logo h1 {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--text);
      font-family: var(--sans);
    }

    .logo h1 span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nav-links a {
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      font-family: var(--mono);
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--text); }

    .live-dot {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: var(--mono);
    }

    .live-dot::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── Page header ── */
    .page-header {
      margin-bottom: 1.75rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
    }

    .page-title {
      font-family: var(--mono);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .page-subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    /* ── Buttons ── */
    .btn {
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.45rem 1rem;
      border-radius: 4px;
      border: 1px solid transparent;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover {
      background: var(--accent2);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border-color: var(--border2);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border-color: var(--red);
    }
    .btn-danger:hover { background: var(--red-dim); }

    /* ── Severity badges ── */
    .badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge-critical { background: rgba(242,73,92,0.15); color: var(--red);     border: 1px solid rgba(242,73,92,0.35); }
    .badge-high     { background: rgba(242,73,92,0.10); color: var(--red);     border: 1px solid rgba(242,73,92,0.2); }
    .badge-medium   { background: var(--accent-dim);    color: var(--accent);  border: 1px solid rgba(255,107,0,0.3); }
    .badge-low      { background: var(--yellow-dim);    color: var(--yellow);  border: 1px solid rgba(245,166,35,0.3); }

    /* ── Status colors ── */
    .status-open          { color: var(--red); }
    .status-investigating  { color: var(--yellow); }
    .status-mitigated     { color: var(--accent); }
    .status-resolved      { color: var(--green); }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem;
    }

    .card-title {
      font-family: var(--mono);
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.875rem;
    }

    /* ── Flash messages ── */
    .flash {
      background: var(--accent-dim);
      border: 1px solid rgba(255,107,0,0.3);
      border-radius: 4px;
      padding: 0.625rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.82rem;
      color: var(--accent2);
    }

    {% block extra_styles %}{% endblock %}

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .container { padding: 0.75rem; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      .page-header > div:last-child { align-self: stretch; }
      .page-header .btn { width: 100%; justify-content: center; }
      .nav-links a { font-size: 0.72rem; }
      .logo h1 { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">
      <div class="logo-icon">#</div>
      <h1>On-Call <span>Assistant</span></h1>
    </a>
    <div class="header-right">
      <nav class="nav-links">
        <a href="/">Incidents</a>
        <a href="/incidents/new">+ New</a>
      </nav>
      <span class="live-dot">Live</span>
    </div>
  </header>

  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
