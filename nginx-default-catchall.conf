##
# Default catch-all — drops direct IP requests that don't match any vhost.
# Prevents bare IP (e.g. http://161.35.229.80/) from serving app content.
#
# Install:
#   sudo cp nginx-default-catchall.conf /etc/nginx/sites-available/000-default-catchall
#   sudo ln -sf /etc/nginx/sites-available/000-default-catchall /etc/nginx/sites-enabled/000-default-catchall
#   sudo nginx -t && sudo systemctl reload nginx
##

server {
    listen 80 default_server;
    server_name _;

    # Silently drop — no response, no fingerprint
    return 444;
}
