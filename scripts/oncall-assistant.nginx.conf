server {
    listen 80;
    server_name oncall.ado-runner.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name oncall.ado-runner.com;

    # Cloudflare origin cert — adjust paths as needed
    ssl_certificate     /etc/ssl/cloudflare/oncall.ado-runner.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/oncall.ado-runner.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/oncall-assistant-access.log;
    error_log  /var/log/nginx/oncall-assistant-error.log;

    location / {
        proxy_pass         http://127.0.0.1:5003;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Webhook endpoint — also proxied, but note the Telegram webhook
    # must be registered at: https://api.telegram.org/bot<TOKEN>/setWebhook
    # with URL: https://oncall.ado-runner.com/webhooks/telegram
}
